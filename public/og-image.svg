  <text x="850" y="300" font-family="system-ui" font-size="13" fill="#111827" font-weight="500">Vector Similarity</text>
  <text x="1068" y="300" font-family="monospace" font-size="11" fill="#9ca3af">~8%</text>

  <rect x="800" y="324" width="320" height="44" rx="8" fill="#ffffff" stroke="#e2e4e9" stroke-width="1"/>
  <rect x="812" y="336" width="28" height="20" rx="4" fill="#f59e0b"/>
  <text x="819" y="351" font-family="monospace" font-size="10" fill="white" font-weight="700">L3</text>
  <text x="850" y="352" font-family="system-ui" font-size="13" fill="#111827" font-weight="500">Semantic Reasoning</text>
  <text x="1068" y="352" font-family="monospace" font-size="11" fill="#9ca3af">~2%</text>

  <rect x="800" y="376" width="320" height="44" rx="8" fill="#ffffff" stroke="#e2e4e9" stroke-width="1"/>
