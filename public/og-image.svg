  <text x="819" y="247" font-family="monospace" font-size="10" fill="white" font-weight="700">L1</text>
  <text x="850" y="248" font-family="system-ui" font-size="13" fill="#111827" font-weight="500">Deterministic Match</text>
  <text x="1060" y="248" font-family="monospace" font-size="11" fill="#9ca3af">~85%</text>

  <rect x="800" y="272" width="320" height="44" rx="8" fill="#ffffff" stroke="#e2e4e9" stroke-width="1"/>
  <rect x="812" y="284" width="28" height="20" rx="4" fill="#a78bfa"/>
